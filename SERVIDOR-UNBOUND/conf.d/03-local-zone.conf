# Local DNS zones
# Uncomment and adjust for local network resolution:

# local-zone: "home.lab." static
# local-data: "router.home.lab. 300 IN A 192.168.1.1"
# local-data: "nas.home.lab.    300 IN A 192.168.1.100"
# local-data: "server.home.lab. 300 IN A 192.168.1.10"
# local-data-ptr: "192.168.1.1  router.home.lab"
# local-data-ptr: "192.168.1.100 nas.home.lab"
# local-data-ptr: "192.168.1.10  server.home.lab"

# Block malicious domains (example)
# local-zone: "example-malware.com." redirect
# local-data: "example-malware.com.  IN A 0.0.0.0"

# RPZ-style blocklist (point to a file)
# include: /opt/unbound/etc/unbound/local-data/blocklist.conf
