server:
    interface: 0.0.0.0
    interface: ::0
    port: 53

    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow
    access-control: ::ffff:127.0.0.0/104 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    prefer-ip6: no

    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes
    harden-short-bufsize: yes
    harden-large-queries: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    use-caps-for-id: yes

    val-clean-additional: yes
    val-permissive-mode: no
    val-log-level: 1

    aggressive-nsec: yes
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-client-timeout: 1800
    serve-expired-reply-ttl: 30

    rrset-roundrobin: yes
    minimal-responses: yes

    so-reuseport: yes
    so-rcvbuf: 4m
    so-sndbuf: 4m
    unwanted-reply-threshold: 10000
    jostle-timeout: 200
    infra-cache-numhosts: 20000
    infra-cache-slabs: 8
    key-cache-slabs: 8
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    rrset-cache-size: 256m
    msg-cache-size: 128m
    outgoing-range: 4096
    num-queries-per-thread: 2048
    outgoing-num-tcp: 256
    incoming-num-tcp: 1024

    cache-min-ttl: 300
    cache-max-ttl: 86400
    infra-host-ttl: 900
    infra-cache-min-rtt: 50

    edns-buffer-size: 1232
    max-udp-size: 1232

    target-fetch-policy: "3 2 1 0 0"
    negative-cache-size: 1m

    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    do-not-query-localhost: yes

    username: unbound
    directory: /opt/unbound/etc/unbound
    chroot: /opt/unbound/etc/unbound
    pidfile: /opt/unbound/etc/unbound/run/unbound.pid
    logfile: /var/log/unbound/unbound.log
    use-syslog: no
    log-time-ascii: yes
    log-queries: no
    log-replies: no
    log-local-actions: no
    log-servfail: yes
    verbosity: 1

    # root-hints: /opt/unbound/etc/unbound/root.hints
    auto-trust-anchor-file: /opt/unbound/etc/unbound/root.key

    # TLS — desabilitado até gerar os certificados
    # tls-port: 853
    # tls-service-pem: /opt/unbound/etc/unbound/tls/server.pem
    # tls-service-key: /opt/unbound/etc/unbound/tls/server.key

    include: /opt/unbound/etc/unbound/conf.d/*.conf

remote-control:
    control-enable: yes
    control-interface: /opt/unbound/etc/unbound/run/unbound.ctl
    control-use-cert: no
