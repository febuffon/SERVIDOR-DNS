services:
  unbound:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dns-server
    restart: unless-stopped
    ports:
      - "${DNS_PORT:-53}:53/udp"
      - "${DNS_PORT:-53}:53/tcp"
      - "${DNS_TLS_PORT:-853}:853/tcp"
    volumes:
      - ./unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
      - ./conf.d:/opt/unbound/etc/unbound/conf.d:ro
      - ./local-data:/opt/unbound/etc/unbound/local-data:ro
      - unbound_run:/opt/unbound/etc/unbound/run
      - unbound_cache:/opt/unbound/etc/unbound/cache
      - unbound_log:/var/log/unbound
    healthcheck:
      test: ["CMD", "unbound-control", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dns_network

  unbound-exporter:
    image: prometheuscommunity/unbound-exporter:v0.4.2
    container_name: dns-exporter
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-9167}:9167/tcp"
    environment:
      - UNBOUND_CONTROL_SOCKET=/opt/unbound/etc/unbound/run/unbound.ctl
    volumes:
      - unbound_run:/opt/unbound/etc/unbound/run:ro
    depends_on:
      unbound:
        condition: service_healthy
    profiles:
      - monitoring

volumes:
  unbound_run:
  unbound_cache:
  unbound_log:

networks:
  dns_network:
    driver: bridge
    ipam:
      config:
        - subnet: "${NETWORK_SUBNET:-10.100.0.0/16}"
